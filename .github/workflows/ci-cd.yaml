name: Rankkit Internal Tool Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build app
        run: npm run build

  deploy:
    name: Deploy to VPS
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "➡️ Moving to backend project"
            cd /home/delicate/apps/rankkit-internal-tool-backend

            echo "➡️ Pulling latest code"
            git fetch origin
            git reset --hard origin/main

            echo "➡️ Installing dependencies"
            npm ci

            echo "➡️ Generating Prisma client"
            npx prisma generate

            echo "➡️ Running production migrations"
            npx prisma migrate deploy

            echo "➡️ Cleaning previous build"
            rm -rf dist

            echo "➡️ Building backend"
            npm run build

            echo "➡️ Restarting PM2 app"
            pm2 restart rankkit-internal-tool-backend --update-env || pm2 start dist/server.js --name rankkit-internal-tool-backend

            echo "➡️ Saving PM2 process list"
            pm2 save

            echo "✅ Backend deployment successful"

  health-check:
    name: Health Check
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check live API
        run: |
          curl --fail --silent --show-error https://api.rankkitstudio.com/

  notify:
    name: Notify on Failure
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Notify on failure
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: Rankkit Internal Tool Backend build or deployment failed!
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}