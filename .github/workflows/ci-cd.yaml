name: Rankkit Internal Tool Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Backend
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Verify Prisma versions
        run: npm ls prisma @prisma/client

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build app
        run: npm run build

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to VPS
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' 
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd /home/delicate/apps/rankkit-internal-tool-backend
            git fetch origin
            git reset --hard origin/main

            npm ci --include=dev
            npm ls prisma @prisma/client
            npx prisma generate
            npx prisma migrate deploy
            rm -rf dist
            npm run build

            export APP_VERSION="${{ github.sha }}"
            pm2 restart rankkit-internal-tool-backend --update-env || pm2 start dist/server.js --name rankkit-internal-tool-backend --cwd "$PWD"
            sleep 5
            pm2 show rankkit-internal-tool-backend

            LIVE_VERSION="$(curl -fsS https://api.rankkitstudio.com/ | node -e 'let input = ""; process.stdin.on("data", chunk => input += chunk); process.stdin.on("end", () => process.stdout.write(JSON.parse(input).version || ""));')"
            if [ "$LIVE_VERSION" != "$APP_VERSION" ]; then
              echo "Public API is serving $LIVE_VERSION instead of $APP_VERSION"
              pm2 logs rankkit-internal-tool-backend --err --lines 50 --nostream
              exit 1
            fi

            pm2 save
